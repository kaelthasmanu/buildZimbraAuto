name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Read Zimbra variables from file
      id: read_zimbra_variables
      run: |
        source zimbra.ver
        echo "build_no=0001" >> "$GITHUB_OUTPUT"
        echo "build_release=$BUILD_RELEASE" >> "$GITHUB_OUTPUT"
        echo "build_release_no=$ZIMBRA_VER" >> "$GITHUB_OUTPUT"
        echo "build_os=$BUILD_OS" >> "$GITHUB_OUTPUT"

    - name: Set up SSH key for GitHub (needed by zm-build)
      run: |
        mkdir -p ${{ github.workspace }}/ssh
        printf '%s\n' "${{ secrets.BUILD_SSH_PRIVATE_KEY }}" > ${{ github.workspace }}/ssh/id_rsa
        chmod 600 ${{ github.workspace }}/ssh/id_rsa
        ssh-keyscan -H github.com >> ${{ github.workspace }}/ssh/known_hosts

    - name: Build Docker image
      run: |
        docker build --pull -t zbs .

    - name: Run Docker container and get dynamic directory name
      id: docker_and_directory
      run: |
        set -euo pipefail
        mkdir -p ${{ github.workspace }}/volume

        # Ejecutar el contenedor construido pasando la versión como env vars
        docker run --rm --name "zbs_build" \
          -v ${{ github.workspace }}/volume:/home/git/zimbra/BUILDS \
          -v ${{ github.workspace }}/ssh:/root/.ssh:ro \
          -e BUILD_NO="${{ steps.read_zimbra_variables.outputs.build_no }}" \
          -e BUILD_RELEASE="${{ steps.read_zimbra_variables.outputs.build_release }}" \
          -e BUILD_RELEASE_NO="${{ steps.read_zimbra_variables.outputs.build_release_no }}" \
          -e BUILD_RELEASE_CANDIDATE="GA" \
          -e BUILD_TYPE="FOSS" \
          zbs

        # Obtener el nombre del directorio dinámico generado por el build
        shopt -s nullglob
        build_dirs=("${{ github.workspace }}/volume"/*/)

        if [ ${#build_dirs[@]} -eq 0 ]; then
          echo "No se generó ningún directorio dentro de volume/."
          echo "Contenido actual del workspace:"
          ls -la ${{ github.workspace }}
          echo "Contenido actual de volume/:"
          ls -la ${{ github.workspace }}/volume
          exit 1
        fi

        DIRECTORY_NAME=$(printf '%s\n' "${build_dirs[@]}" | sort | tail -n1)
        echo "$DIRECTORY_NAME"
        echo "directory_name=$DIRECTORY_NAME" >> "$GITHUB_ENV"
        echo "directory_name=$DIRECTORY_NAME" >> "$GITHUB_OUTPUT"

    - name: Upload artifact
      if: steps.docker_and_directory.outputs.directory_name != ''
      uses: actions/upload-artifact@v4
      with:
        name: zimbra-package
        path: ${{ steps.docker_and_directory.outputs.directory_name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Download packages
        id: download_packages
        uses: actions/download-artifact@v4
        with:
          name: zimbra-package
      
      - name: Get list directory 
        run: echo "$(ls -R)"

      - name: Get directory
        run: echo "$(pwd)"
      
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.5
        with: 
          filename: zimbra.zip

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}

      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} 
          asset_path: ./zimbra.zip
          asset_name: zimbra.zip
          asset_content_type: application/zip