name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Read Zimbra variables from file
      id: read_zimbra_variables
      run: |
        source zimbra.ver
        echo "BUILD_RELEASE=$BUILD_RELEASE" >> $GITHUB_ENV
        echo "BUILD_RELEASE_NO=$ZIMBRA_VER" >> $GITHUB_ENV
        echo "BUILD_OS=$BUILD_OS" >> $GITHUB_ENV

    - name: Set up SSH key for GitHub (needed by zm-build)
      run: |
        mkdir -p ${{ github.workspace }}/ssh
        echo "${{ secrets.BUILD_SSH_PRIVATE_KEY }}" > ${{ github.workspace }}/ssh/id_rsa
        chmod 600 ${{ github.workspace }}/ssh/id_rsa
        ssh-keyscan github.com >> ${{ github.workspace }}/ssh/known_hosts

    - name: Build Docker image
      run: |
        docker build -t zbs .

    - name: Run Docker container and get dynamic directory name
      id: docker_and_directory
      run: |
        mkdir -p ${{ github.workspace }}/volume

        # Copiar config.build con versión actualizada al contexto del contenedor
        sed -e "s/^BUILD_RELEASE_NO.*/BUILD_RELEASE_NO = ${{ env.BUILD_RELEASE_NO }}/" \
            -e "s/^BUILD_RELEASE[[:space:]]*.*/BUILD_RELEASE = ${{ env.BUILD_RELEASE }}/" \
            config.build > /tmp/config.build.patched

        # Ejecutar el contenedor construido
        docker run --rm --name "zbs_build" \
          -v ${{ github.workspace }}/volume:/home/git/zimbra/BUILDS \
          -v ${{ github.workspace }}/ssh:/root/.ssh:ro \
          -v /tmp/config.build.patched:/home/git/zimbra-build-scripts/config.build:ro \
          zbs

        # Obtener el nombre del directorio dinámico generado por el build
        DIRECTORY_NAME=$(ls -td ${{ github.workspace }}/volume/*/ | head -n1)
        echo "$DIRECTORY_NAME"
        echo "$(ls -td $DIRECTORY_NAME*)"
        echo "directory_name=$DIRECTORY_NAME" >> "$GITHUB_ENV"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zimbra-package
        path: ${{ env.directory_name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packages
        id: download_packages
        uses: actions/download-artifact@v4
        with:
          name: zimbra-package
      
      - name: Get list directory 
        run: echo "$(ls -R)"

      - name: Get directory
        run: echo "$(pwd)"
      
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.5
        with: 
          filename: zimbra.zip

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}

      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} 
          asset_path: ./zimbra.zip
          asset_name: zimbra.zip
          asset_content_type: application/zip